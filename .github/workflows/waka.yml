name: Update WakaTime Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README
    runs-on: ubuntu-latest

    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

          SHOW_TITLE: false
          SECTION_NAME: waka

          BLOCKS: ⣀⣄⣤⣦⣶⣷⣿
          CODE_LANG: txt

          TIME_RANGE: last_7_days

          LANG_COUNT: 8

          SHOW_TIME: true
          SHOW_TOTAL: true
          SHOW_MASKED_TIME: false

          STOP_AT_OTHER: true

          IGNORED_LANGUAGES: Binary,Text,Other

          COMMIT_BY_ME: true
          COMMIT_MESSAGE: "docs: update WakaTime stats"
